name: Build iOS (unsigned IPA)

on:
  push:
  workflow_dispatch:   # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: macos-15   # Xcode 16, reads the modern (format 77) project XcodeGen emits
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (no code signing)
        run: |
          xcodebuild \
            -project VaultSync.xcodeproj \
            -scheme VaultSync \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/VaultSync.app Payload/
          zip -r VaultSync.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultSync-ipa
          path: VaultSync.ipa
