name: SensorTrack
options:
  bundleIdPrefix: com.example
  objectVersion: 56          # Xcode 15-compatible format
  deploymentTarget:
    iOS: "15.0"
targets:
  SensorTrack:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: SensorTrack
        UILaunchScreen: {}
        UIBackgroundModes:
          - location
        NSLocationWhenInUseUsageDescription: "Keeps the vault sync running while you use the app."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Keeps the vault sync running periodically in the background."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.sensortrack
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "2"
        TARGETED_DEVICE_FAMILY: "1,2"
