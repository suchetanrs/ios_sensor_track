name: SensorTrack
options:
  bundleIdPrefix: com.example
  objectVersion: 56          # Xcode 15-compatible format (runner has Xcode 15.4)
  deploymentTarget:
    iOS: "15.0"
targets:
  SensorTrack:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.sensortrack
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMotionUsageDescription: "Used to display live motion sensor readings."
